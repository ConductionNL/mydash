name: SBOM

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, development]

permissions:
  contents: write
  pull-requests: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    name: "SBOM Generation & Validation"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, zip, gd, curl, xml, json
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate PHP SBOM
        run: composer CycloneDX:make-sbom --output-format=JSON --output-file=bom-php.cdx.json --spec-version=1.5 --omit=dev --omit=plugin

      - name: Install npm dependencies
        run: npm ci

      - name: Generate npm SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file bom-npm.cdx.json --spec-version 1.5 --omit dev

      - name: Merge PHP + npm SBOMs
        run: |
          jq -s '.[0] * {components: ([.[].components[]?] | unique_by(.purl // .name))}' bom-php.cdx.json bom-npm.cdx.json > sbom.cdx.json

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v5
        id: grype-install

      - name: Create Grype ignore list for known false positives
        run: |
          if [ ! -f .grype.yaml ]; then
            cat > .grype.yaml << 'GRYPE'
          ignore:
            # False positives: Grype matches unscoped CycloneDX component names
            # against malware advisories for typosquatting packages. Actual deps
            # are scoped (@jridgewell/gen-mapping, @babel/helper-validator-identifier).
            - vulnerability: GHSA-8rmg-jf7p-4p22
            - vulnerability: GHSA-pvjq-589m-3mc8
          GRYPE
          fi

      - name: CVE scan SBOM
        run: ${{ steps.grype-install.outputs.cmd }} sbom:sbom.cdx.json --fail-on critical

      - name: Composer audit
        run: composer audit --format=json || true

      - name: npm audit
        run: npm audit --audit-level=critical

      # Protected branches (main, development, beta) reject direct pushes per
      # the org ruleset, so route SBOM updates through a PR instead. On any
      # other branch (feature/**, bugfix/**, hotfix/**) commit + push direct
      # since they aren't protected. Skip entirely on pull_request events —
      # the SBOM is already validated by the steps above; merging the PR will
      # re-trigger this workflow on the target branch.
      - name: Commit SBOM (unprotected branches)
        if: |
          github.event_name == 'push' &&
          github.ref_name != 'main' &&
          github.ref_name != 'development' &&
          github.ref_name != 'beta'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sbom.cdx.json
          if git diff --cached --quiet; then
            echo "No SBOM changes to commit"
          else
            git commit -m "chore: update SBOM"
            git push
          fi

      - name: Open PR with SBOM update (protected branches)
        if: |
          github.event_name == 'push' &&
          (github.ref_name == 'main' || github.ref_name == 'development' || github.ref_name == 'beta')
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update SBOM"
          title: "chore: update SBOM (auto-generated)"
          body: |
            Auto-generated SBOM regeneration after a push to `${{ github.ref_name }}`.

            Source run: [${{ github.workflow }} #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Merge to keep `sbom.cdx.json` in sync with the locked dependency tree on `${{ github.ref_name }}`.
          branch: chore/sbom-update-${{ github.ref_name }}
          base: ${{ github.ref_name }}
          add-paths: sbom.cdx.json
          delete-branch: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-mydash
          path: sbom.cdx.json
          retention-days: 90

      - name: Attach SBOM to release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.cdx.json
